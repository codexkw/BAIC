name: Build and Deploy to IIS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/BAIC.Web/BAIC.Web.csproj

    - name: Build
      run: dotnet build src/BAIC.Web/BAIC.Web.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish src/BAIC.Web/BAIC.Web.csproj --configuration Release --no-build --output ./publish

    - name: Deploy to IIS
      shell: cmd
      env:
        DEPLOY_URL: ${{ secrets.MSDEPLOY_URL }}
        DEPLOY_USER: ${{ secrets.MSDEPLOY_USERNAME }}
        DEPLOY_PASS: ${{ secrets.MSDEPLOY_PASSWORD }}
        DEPLOY_SITE: ${{ secrets.IIS_SITE_NAME }}
      run: >
        "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
        -verb:sync
        -source:contentPath="%GITHUB_WORKSPACE%\publish"
        -dest:contentPath="%DEPLOY_SITE%",computerName="%DEPLOY_URL%",username="%DEPLOY_USER%",password="%DEPLOY_PASS%",authType="Basic"
        -allowUntrusted
        -enableRule:AppOffline
